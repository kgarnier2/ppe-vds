<div class="formulaire">
    <div id="msg"></div>
    <label for="date" class="obligatoire ">Date de l'茅preuve</label>
    <input id='date' type="date" style="width: 180px;" required>
    <label class='obligatoire ' for="titre">
        Nom de l'茅preuve <span class='commentaire'> (lettres, chiffres, espace de s茅paration accept茅) </span>
    </label>
    <input id='titre' type="text"
           required
           pattern="^[0-9A-Za-z脌脕脗脙脛脜脟脠脡脢脣脤脥脦脧脪脫脭脮脰脵脷脹脺脻脿谩芒茫盲氓莽猫茅锚毛矛铆卯茂冒貌贸么玫枚霉煤没眉媒每](?:[,' \-]?[0-9A-Za-z脌脕脗脙脛脜脟脠脡脢脣脤脥脦脧脪脫脭脮脰脵脷脹脺脻脿谩芒茫盲氓莽猫茅锚毛矛铆卯茂冒貌贸么玫枚霉煤没眉媒每])*$"
           minlength="10">
    <label for="nomFichier" class='obligatoire'>Fichier PDF</label>
    <div class="groupe-fichier">
        <button id="btnFichier" class="btn btn-sm btn-outline-secondary">馃搧 Choisir un fichier</button>
        <span id="nomFichier" class="texte-muted ms-2"></span>
    </div>
    <input type="file" id="fichier" accept="" style='display: none '>
    <button id="btnAjouter" class="btn btn-danger">Ajouter</button>
</div>
